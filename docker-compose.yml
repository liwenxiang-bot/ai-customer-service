services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acs-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acs_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-acs}
    ports:
      # Bind to loopback only — never expose the DB to the public internet.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acs} -d ${POSTGRES_DB:-acs}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: acs-redis
    command: redis-server --appendonly yes
    ports:
      # Loopback only — a public Redis with no auth is a critical vulnerability.
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: acs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      # Loopback only. If you need browser-reachable media, proxy /media via nginx.
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Create the default bucket on startup, then exit.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/${MINIO_BUCKET:-acs-media} || true;
      mc anonymous set download local/${MINIO_BUCKET:-acs-media} || true;
      echo 'MinIO bucket ready';
      "

  # ----------------------------------------------------------------------------
  # Application services. Enable with:  docker compose --profile app up -d --build
  # (Without the profile, only the infra deps above start — handy for local dev
  #  where you run the backend/worker on the host.)
  # ----------------------------------------------------------------------------
  migrate:
    profiles: ["app"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: sh -c "alembic upgrade head && python -m scripts.bootstrap"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
    ports:
      # Loopback only — public traffic comes through nginx (80/443) → 127.0.0.1:8000.
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: arq app.tasks.worker.WorkerSettings
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT_URL: http://minio:9000
    # The worker has no HTTP server, so override the image's HTTP healthcheck with a
    # Redis-connectivity probe (its core dependency).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('redis', 6379), 3)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  admin:
    profiles: ["app"]
    build:
      context: .
      dockerfile: admin/Dockerfile
    ports:
      # Loopback only — reach the admin through nginx (admin.yourdomain) → 127.0.0.1:8080.
      - "127.0.0.1:${ADMIN_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  minio_data:
