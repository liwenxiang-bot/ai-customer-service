# Admin nginx: serve the SPA, proxy API + WebSocket to the backend service.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS and resolve the backend at request time (via a
    # variable in proxy_pass) so a recreated backend container's new IP is picked
    # up automatically — instead of nginx caching the old IP at startup (→ 502).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8000;

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → backend.
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (chat) → backend.
    location /ws/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }
}
