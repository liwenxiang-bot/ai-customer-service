# Production reverse proxy example (HTTPS/WSS termination in front of the backend).
# Adapt server_name + certificate paths; place behind your TLS setup of choice.

upstream acs_backend {
    server backend:8000;   # or 127.0.0.1:8000
}

server {
    listen 80;
    server_name chat.example.com;
    # Redirect everything to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;   # allow knowledge import / attachments

    # HTTP API + widget assets + standalone chat page.
    location / {
        proxy_pass http://acs_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket chat (WSS).
    location /ws/ {
        proxy_pass http://acs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;   # long-lived sockets
    }

    # Do not expose internal metrics publicly — scrape /metrics on the internal network.
    location /metrics { deny all; }
}
