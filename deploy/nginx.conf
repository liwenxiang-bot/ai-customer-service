# 生产 nginx 站点配置（用你服务器已有的 nginx）
# 放到 /etc/nginx/conf.d/acs.conf（或 sites-available/ 并软链到 sites-enabled/）
# 把 chat.example.com / admin.example.com 改成你的真实域名后：
#   sudo nginx -t && sudo systemctl reload nginx
# HTTPS 证书用 certbot 自动签发：
#   sudo certbot --nginx -d chat.example.com -d admin.example.com
# certbot 会自动追加 443 server 块、配置证书并加 80→443 跳转。
#
# 前提：docker 全栈已起，backend 在本机 :8000、admin 在本机 :8080（= .env 的 ADMIN_PORT）。

# ── 对话端（公开）：widget.js / /chat / /api / WebSocket 都在 backend ──
server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;

    client_max_body_size 20m;   # 知识库导入 / 附件

    # WebSocket（流式对话）—— 必须有 Upgrade 头，否则连不上
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;   # 长连接
    }

    # 其余：/embed/widget.js、/chat、/api/chat、/health
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 指标不对外
    location /metrics { deny all; }
}

# ── 运营后台（建议限制访问）：admin 容器（其内部 nginx 再代理 /api、/ws 到 backend）──
server {
    listen 80;
    listen [::]:80;
    server_name admin.example.com;

    client_max_body_size 20m;

    # 可选：仅允许你的办公网 IP 访问后台
    # allow 1.2.3.4;
    # deny all;

    location / {
        proxy_pass http://127.0.0.1:8080;   # = .env 里的 ADMIN_PORT
        # ⚠️ 这 3 行（http_version 1.1 + Upgrade + Connection）是后台实时 WebSocket
        # (/ws/admin) 的命脉，千万别删！少了它 ws/admin 会每 ~200ms 断一次疯狂重连，
        # 坐席工作台退化成轮询：消息不实时、「正在输入」提示失效。certbot 改写或手动
        # 精简配置时最容易把这段弄丢。
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
}
